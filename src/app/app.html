<main class="main">
  <header>
    <h1>Calculadora por Joaquin Pettinari</h1>
  </header>
  <div class="calculator">
    <img src="/base_calculadora.png" alt="Calculator base" class="calculator-image" />
    <h6 class="display">
      {{ display }}
    </h6>
    <div class="buttons">
      <button class="button-operation" (click)="onAdd()">
        +
      </button>
      <button class="button-operation" (click)="onRemoveLastOne()">
        <- </button>
          <button class="button-operation" (click)="onRestart()">
            C
          </button>
          <button class="equals button-operation" (click)="onTotal()">
            =
          </button>
          @for (num of numbers; track num) {
          <button (click)="onNumberClick(num)" class="button">
            {{ num }}
          </button>
          }
    </div>
  </div>
</main>

<router-outlet />
